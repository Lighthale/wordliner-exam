name: wordliner-exam
services:
    php:
        image: php:8.3-fpm-alpine
        working_dir: /var/www/html
        volumes:
            - ../:/var/www/html
        environment:
            APP_ENV: dev
        depends_on:
            - db
        # Install common Symfony requirements on container start (simple dev approach)
        command: >
            sh -lc "
              apk add --no-cache bash git unzip icu-dev oniguruma-dev libzip-dev linux-headers $$(apk search -q php83-pecl-*) ||
                true;
              docker-php-ext-configure intl;
              docker-php-ext-install -j$$(nproc) intl pdo pdo_mysql opcache zip;
              php-fpm
            "

    nginx:
        image: nginx:1.27-alpine
        ports:
            - "8080:80"
        volumes:
            - ../:/var/www/html:ro
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - php

    db:
        image: mysql:8.4
        environment:
            MYSQL_DATABASE: wordliner
            MYSQL_USER: wluser
            MYSQL_PASSWORD: wlpassword
            MYSQL_ROOT_PASSWORD: root
        ports:
            - "3306:3306"
        volumes:
            - db_data:/var/lib/mysql

    phpmyadmin:
        image: phpmyadmin:5
        environment:
            PMA_HOST: db
            PMA_PORT: 3306
        ports:
            - "8081:80"
        depends_on:
            - db

    redis:
        image: redis:7.0.0
        ports:
            - "6379:6379"

volumes:
    db_data:
